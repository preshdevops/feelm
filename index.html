<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('feelm_theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Feelm — Tell us your mood, and we'll find the perfect movie for you. AI-powered mood-based movie recommendations." />
    <meta name="theme-color" content="#0a0b14" />
    <title>Feelm — Mood-Based Movie Recommendations</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
